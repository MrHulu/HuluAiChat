name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-backend:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            python-arch: 'arm64'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            python-arch: 'x86_64'
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            python-arch: 'x86_64'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            python-arch: 'x64'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: ${{ matrix.python-arch }}

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Install backend dependencies
        run: |
          cd huluchat-v3/backend
          pip install -r requirements.txt

      - name: Build backend binary (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          cd huluchat-v3/backend
          pyinstaller --onefile --name huluchat-backend-${{ matrix.target }} main.py
          mv dist/huluchat-backend-${{ matrix.target }} ../src-tauri/binaries/

      - name: Build backend binary (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          cd huluchat-v3/backend
          pyinstaller --onefile --name huluchat-backend-${{ matrix.target }} main.py
          mv dist/huluchat-backend-${{ matrix.target }}.exe ../src-tauri/binaries/

      - name: Upload backend binary
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.target }}
          path: |
            huluchat-v3/src-tauri/binaries/huluchat-backend-${{ matrix.target }}*

  build-tauri:
    needs: build-backend
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
            target: 'x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            args: ''
            target: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download backend binary
        uses: actions/download-artifact@v4
        with:
          name: backend-${{ matrix.target }}
          path: huluchat-v3/src-tauri/binaries/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './huluchat-v3/src-tauri -> target'

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: |
          cd huluchat-v3
          npm install

      - name: Make backend executable (Unix)
        if: matrix.platform != 'windows-latest'
        run: chmod +x huluchat-v3/src-tauri/binaries/huluchat-backend-${{ matrix.target }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: huluchat-v3
          tagName: ${{ github.ref_name }}
          releaseName: 'HuluChat v__VERSION__'
          releaseBody: 'See CHANGELOG for details.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  update-release:
    needs: build-tauri
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: get-version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate latest.json
        run: |
          VERSION="${{ steps.get-version.outputs.VERSION }}"
          TAG_NAME="${GITHUB_REF_NAME}"
          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "See CHANGELOG for details.",
            "pub_date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "platforms": {
              "darwin-x86_64": {
                "signature": "",
                "url": "https://github.com/MrHulu/HuluChat/releases/download/${TAG_NAME}/HuluChat_${VERSION}_x64.dmg"
              },
              "darwin-aarch64": {
                "signature": "",
                "url": "https://github.com/MrHulu/HuluChat/releases/download/${TAG_NAME}/HuluChat_${VERSION}_aarch64.dmg"
              },
              "linux-x86_64": {
                "signature": "",
                "url": "https://github.com/MrHulu/HuluChat/releases/download/${TAG_NAME}/huluchat_${VERSION}_amd64.AppImage"
              },
              "windows-x86_64": {
                "signature": "",
                "url": "https://github.com/MrHulu/HuluChat/releases/download/${TAG_NAME}/HuluChat_${VERSION}_x64.msi"
              }
            }
          }
          EOF

      - name: Upload latest.json to Release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
