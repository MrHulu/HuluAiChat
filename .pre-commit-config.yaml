# Pre-commit hooks for HuluChat
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Detect secrets in code
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        # Only exclude the baseline file itself - scan everything else including .md and .example files
        exclude: '^\.secrets\.baseline$'

  # Prevent committing to main/master
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: no-commit-to-branch
        args: ['--branch', 'master', '--branch', 'main']

  # Check for large files
      - id: check-added-large-files
        args: ['--maxkb=500']

  # Check for merge conflicts
      - id: check-merge-conflict

  # Check YAML/JSON syntax
      - id: check-yaml
        exclude: 'tauri\.conf\.json'
      - id: check-json

  # Trim trailing whitespace
      - id: trailing-whitespace

  # Ensure newline at end of files
      - id: end-of-file-fixer
