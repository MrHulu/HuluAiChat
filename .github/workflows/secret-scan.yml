# Secret Scanning - CI 层面的敏感信息检测
# 每次 PR 和 Push 都会扫描，防止泄露

name: Secret Scan

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better detection

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets
        run: |
          echo "🔍 Scanning for secrets..."

          # Scan all files except baseline
          detect-secrets scan --all-files \
            --exclude-files '\.secrets\.baseline' \
            > /tmp/scan-results.json

          # Check if any secrets found
          SECRETS_FOUND=$(python -c "
          import json
          with open('/tmp/scan-results.json') as f:
              data = json.load(f)
              count = sum(len(v) for v in data.get('results', {}).values())
              print(count)
          ")

          if [ "$SECRETS_FOUND" -gt 0 ]; then
            echo "🚨 SECRETS DETECTED!"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            cat /tmp/scan-results.json | python -m json.tool
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "If these are false positives:"
            echo "1. Run locally: detect-secrets scan --all-files > .secrets.baseline"
            echo "2. Edit .secrets.baseline to mark as false positives"
            echo "3. Commit the updated baseline"
            exit 1
          fi

          echo "✅ No secrets detected"

      - name: Upload scan results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-results
          path: /tmp/scan-results.json
          retention-days: 7
