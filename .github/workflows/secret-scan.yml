# Secret Scanning - CI 层面的敏感信息检测
# 每次 PR 和 Push 都会扫描，防止泄露

name: Secret Scan

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better detection

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets
        run: |
          echo "🔍 Scanning for secrets..."

          # Scan all files with comprehensive exclusions
          detect-secrets scan --all-files \
            --exclude-files '\.secrets\.baseline' \
            --exclude-files '\.git/' \
            --exclude-files 'node_modules/' \
            --exclude-files '__pycache__/' \
            --exclude-files '\.pytest_cache/' \
            --exclude-files 'dist/' \
            --exclude-files 'build/' \
            --exclude-files '\.next/' \
            --exclude-files 'tests/' \
            --exclude-files '\.test\.' \
            --exclude-files 'test_' \
            --exclude-files '\.spec\.' \
            --exclude-files 'references/' \
            --exclude-files 'SKILL\.md' \
            --exclude-files 'PROMPT\.md' \
            --exclude-files '\.claude/' \
            --exclude-files 'docs/' \
            --exclude-files 'i18n/locales/' \
            --exclude-files 'openai_service\.py' \
            --exclude-files 'tauri\.conf\.json' \
            --exclude-files 'keyring\.ts' \
            --exclude-files 'skills-lock\.json' \
            > /tmp/scan-results.json

          # Check if any secrets found
          SECRETS_FOUND=$(python -c "
          import json
          with open('/tmp/scan-results.json') as f:
              data = json.load(f)
              count = sum(len(v) for v in data.get('results', {}).values())
              print(count)
          ")

          if [ "$SECRETS_FOUND" -gt 0 ]; then
            echo "🚨 SECRETS DETECTED!"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            cat /tmp/scan-results.json | python -m json.tool
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "If these are false positives:"
            echo "1. Update the exclusion list in .github/workflows/secret-scan.yml"
            echo "2. Or run: detect-secrets scan --all-files > .secrets.baseline"
            echo "3. Commit the updated files"
            exit 1
          fi

          echo "✅ No secrets detected"

      - name: Upload scan results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-results
          path: /tmp/scan-results.json
          retention-days: 7
