# Secret Scanning - CI 层面的敏感信息检测  # pragma: allowlist secret
# 每次 PR 和 Push 都会扫描，防止泄露

name: Secret Scan  # pragma: allowlist secret

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better detection

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets
        run: |
          echo "🔍 Scanning for secrets..."

          # Check if baseline exists
          if [ -f ".secrets.baseline" ]; then
            echo "📋 Using baseline file for comparison"

            # Scan and compare with baseline
            # This uses detect-secrets audit mode which respects the baseline
            python3 << 'PYTHON_SCRIPT'
          import json
          import subprocess
          import sys

          # Load baseline
          with open('.secrets.baseline') as f:
              baseline = json.load(f)

          baseline_secrets = set()
          for filename, secrets in baseline.get('results', {}).items():
              for secret in secrets:
                  baseline_secrets.add((filename, secret.get('hashed_secret')))

          # Run scan
          result = subprocess.run(
              ['detect-secrets', 'scan', '--all-files', '--exclude-files', r'\.secrets\.baseline'],
              capture_output=True, text=True
          )
          scan_results = json.loads(result.stdout)

          # Find new secrets not in baseline
          new_secrets = []
          for filename, secrets in scan_results.get('results', {}).items():
              for secret in secrets:
                  key = (filename, secret.get('hashed_secret'))
                  if key not in baseline_secrets:
                      new_secrets.append({
                          'filename': filename,
                          'type': secret.get('type'),
                          'line_number': secret.get('line_number'),
                          'hashed_secret': secret.get('hashed_secret')
                      })

          if new_secrets:
              print("🚨 NEW SECRETS DETECTED!")
              print("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━")
              for s in new_secrets:
                  print(f"  File: {s['filename']}")
                  print(f"  Type: {s['type']}")
                  print(f"  Line: {s['line_number']}")
                  print(f"  Hash: {s['hashed_secret']}")
                  print("")
              print("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━")
              print("")
              print("If these are false positives:")
              print("1. Run: detect-secrets scan --all-files > .secrets.baseline")
              print("2. Or edit .secrets.baseline to add the new entries")
              print("3. Commit the updated baseline")
              sys.exit(1)
          else:
              print("✅ No new secrets detected (baseline respected)")
          PYTHON_SCRIPT
          else
            echo "⚠️ No baseline file found, running full scan"

            # Scan all files except baseline
            detect-secrets scan --all-files \
              --exclude-files '\.secrets\.baseline' \
              > /tmp/scan-results.json

            # Check if any secrets found
            SECRETS_FOUND=$(python -c "
            import json
            with open('/tmp/scan-results.json') as f:
                data = json.load(f)
                count = sum(len(v) for v in data.get('results', {}).values())
                print(count)
            ")

            if [ "$SECRETS_FOUND" -gt 0 ]; then
              echo "🚨 SECRETS DETECTED!"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              cat /tmp/scan-results.json | python -m json.tool
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo ""
              echo "Create a baseline file:"
              echo "  detect-secrets scan --all-files > .secrets.baseline"
              exit 1
            fi

            echo "✅ No secrets detected"
          fi

      - name: Upload scan results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-results
          path: /tmp/scan-results.json
          retention-days: 7
