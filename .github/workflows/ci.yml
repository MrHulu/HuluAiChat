name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: huluchat-v3/package-lock.json

      - name: Install dependencies
        run: |
          cd huluchat-v3
          npm ci

      - name: Type check
        run: |
          cd huluchat-v3
          npm run typecheck

      - name: Lint
        run: |
          cd huluchat-v3
          npm run lint

      - name: Run tests
        run: |
          cd huluchat-v3
          npm test -- --run

      - name: Build frontend
        run: |
          cd huluchat-v3
          npm run build

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd huluchat-v3/backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        run: |
          cd huluchat-v3/backend
          pytest -v

      - name: Type check (mypy)
        run: |
          pip install mypy
          cd huluchat-v3/backend
          mypy . --ignore-missing-imports || true

      - name: Lint (ruff)
        run: |
          pip install ruff
          cd huluchat-v3/backend
          ruff check . || true

  build-tauri:
    needs: [test-frontend, test-backend]
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04]
        target: [x86_64-unknown-linux-gnu]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Install backend dependencies
        run: |
          cd huluchat-v3/backend
          pip install -r requirements.txt

      - name: Build backend binary
        run: |
          cd huluchat-v3/backend
          pyinstaller --onefile --name huluchat-backend-${{ matrix.target }} main.py
          mkdir -p ../src-tauri/binaries
          mv dist/huluchat-backend-${{ matrix.target }} ../src-tauri/binaries/
          chmod +x ../src-tauri/binaries/huluchat-backend-${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: huluchat-v3/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './huluchat-v3/src-tauri -> target'

      - name: Install dependencies (Ubuntu only)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: |
          cd huluchat-v3
          npm ci

      - name: Build Tauri app (check only)
        run: |
          cd huluchat-v3
          npm run tauri build -- --no-bundle
