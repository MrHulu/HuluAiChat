name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: huluchat-v3/package-lock.json

      - name: Install dependencies
        run: |
          cd huluchat-v3
          npm ci

      - name: Type check
        run: |
          cd huluchat-v3
          npm run typecheck

      - name: Lint
        run: |
          cd huluchat-v3
          npm run lint

      - name: Run tests
        run: |
          cd huluchat-v3
          npm test -- --run

      - name: Build frontend
        run: |
          cd huluchat-v3
          npm run build

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: huluchat-v3/backend/requirements.txt

      - name: Install dependencies
        run: |
          cd huluchat-v3/backend
          pip install -r requirements.txt
          pip install pytest==8.3.5 pytest-asyncio==0.24.0

      - name: Run tests
        run: |
          cd huluchat-v3/backend
          pytest -v

      - name: Type check (mypy)
        continue-on-error: true
        run: |
          pip install mypy==1.15.0
          cd huluchat-v3/backend
          mypy . --ignore-missing-imports

      - name: Lint (ruff)
        run: |
          pip install ruff==0.9.10
          cd huluchat-v3/backend
          ruff check .

  test-e2e:
    needs: [test-frontend, test-backend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: huluchat-v3/backend/requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: huluchat-v3/package-lock.json

      - name: Install dependencies
        run: |
          cd huluchat-v3
          npm ci
          cd backend
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          cd huluchat-v3
          npx playwright install chromium

      - name: Start backend server
        run: |
          cd huluchat-v3/backend
          python main.py &
          sleep 5
        env:
          PYTHONUNBUFFERED: 1

      - name: Run E2E tests
        run: |
          cd huluchat-v3
          npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: huluchat-v3/playwright-report/
          retention-days: 7

  build-tauri:
    needs: [test-frontend, test-backend, test-e2e]
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04]
        target: [x86_64-unknown-linux-gnu]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Install backend dependencies
        run: |
          cd huluchat-v3/backend
          pip install -r requirements.txt

      - name: Build backend binary
        run: |
          cd huluchat-v3/backend
          pyinstaller --onefile --name huluchat-backend-${{ matrix.target }} main.py
          mkdir -p ../src-tauri/binaries
          mv dist/huluchat-backend-${{ matrix.target }} ../src-tauri/binaries/
          chmod +x ../src-tauri/binaries/huluchat-backend-${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: huluchat-v3/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './huluchat-v3/src-tauri -> target'

      - name: Install dependencies (Ubuntu only)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: |
          cd huluchat-v3
          npm ci

      - name: Build Tauri app (check only)
        run: |
          cd huluchat-v3
          npm run tauri build -- --no-bundle
