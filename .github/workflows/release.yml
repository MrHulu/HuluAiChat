name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create-release.outputs.id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          name: HuluChat v${{ github.ref_name }}
          body: 'See CHANGELOG for details.'
          draft: true
          prerelease: false

  build-backend:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Install backend dependencies
        run: |
          cd huluchat-v3/backend
          pip install -r requirements.txt

      - name: Build backend binary (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          cd huluchat-v3/backend
          pyinstaller --onefile --name huluchat-backend-${{ matrix.target }} main.py
          mv dist/huluchat-backend-${{ matrix.target }} ../src-tauri/binaries/

      - name: Build backend binary (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          cd huluchat-v3/backend
          pyinstaller --onefile --name huluchat-backend-${{ matrix.target }} main.py
          Move-Item -Force dist/huluchat-backend-${{ matrix.target }}.exe ../src-tauri/binaries/
        shell: pwsh

      - name: Upload backend binary
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.target }}
          path: |
            huluchat-v3/src-tauri/binaries/huluchat-backend-${{ matrix.target }}*

  build-tauri:
    needs: [create-release, build-backend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
            target: 'x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            args: ''
            target: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download backend binary
        uses: actions/download-artifact@v4
        with:
          name: backend-${{ matrix.target }}
          path: huluchat-v3/src-tauri/binaries/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './huluchat-v3/src-tauri -> target'

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: |
          cd huluchat-v3
          npm install

      - name: Make backend executable (Unix)
        if: matrix.platform != 'windows-latest'
        run: chmod +x huluchat-v3/src-tauri/binaries/huluchat-backend-${{ matrix.target }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: huluchat-v3
          releaseId: ${{ needs.create-release.outputs.release-id }}
          args: ${{ matrix.args }}

      - name: Upload signature artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: signatures-${{ matrix.target }}
          path: |
            huluchat-v3/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.sig

      - name: Upload signature artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: signatures-${{ matrix.target }}
          path: |
            huluchat-v3/src-tauri/target/release/bundle/appimage/*.sig

      - name: Upload signature artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: signatures-${{ matrix.target }}
          path: |
            huluchat-v3/src-tauri/target/release/bundle/msi/*.sig
            huluchat-v3/src-tauri/target/release/bundle/nsis/*.sig

  update-release:
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all signature artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: signatures-*
          path: signatures
          merge-multiple: true

      - name: Get version
        id: get-version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate latest.json with signatures
        run: |
          VERSION="${{ steps.get-version.outputs.VERSION }}"
          TAG_NAME="${GITHUB_REF_NAME}"

          # Read signature files
          DARWIN_X64_SIG=$(cat signatures/HuluChat.app.tar.gz.sig 2>/dev/null || echo "")
          DARWIN_ARM64_SIG=$(cat signatures/HuluChat.app.tar.gz.sig 2>/dev/null || echo "")
          LINUX_SIG=$(cat signatures/HuluChat_*.AppImage.sig 2>/dev/null || echo "")
          WINDOWS_SIG=$(cat signatures/HuluChat_*_en-US.msi.sig 2>/dev/null || echo "")

          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "See CHANGELOG for details.",
            "pub_date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "platforms": {
              "darwin-x86_64": {
                "signature": "${DARWIN_X64_SIG}",
                "url": "https://github.com/MrHulu/HuluAiChat/releases/download/${TAG_NAME}/HuluChat_${VERSION}_x64.app.tar.gz"
              },
              "darwin-aarch64": {
                "signature": "${DARWIN_ARM64_SIG}",
                "url": "https://github.com/MrHulu/HuluAiChat/releases/download/${TAG_NAME}/HuluChat_${VERSION}_aarch64.app.tar.gz"
              },
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "https://github.com/MrHulu/HuluAiChat/releases/download/${TAG_NAME}/HuluChat_${VERSION}_amd64.AppImage"
              },
              "windows-x86_64": {
                "signature": "${WINDOWS_SIG}",
                "url": "https://github.com/MrHulu/HuluAiChat/releases/download/${TAG_NAME}/HuluChat_${VERSION}_x64_en-US.msi"
              }
            }
          }
          EOF

          echo "Generated latest.json:"
          cat latest.json

      - name: Upload latest.json and publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
          draft: false

  update-website-version:
    needs: update-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: get-version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Get release notes from CHANGELOG
        id: get-notes
        run: |
          VERSION="${{ steps.get-version.outputs.VERSION }}"
          # Extract release notes from CHANGELOG.md
          NOTES=$(sed -n "/^## \[${VERSION}\]/,/^## \[/p" CHANGELOG.md | head -n 5 | tail -n +2 | head -n 1 | sed 's/^[- ]*//' | cut -c1-80)
          if [ -z "$NOTES" ]; then
            NOTES="New features and improvements"
          fi
          echo "NOTES=${NOTES}" >> $GITHUB_OUTPUT

      - name: Update version.ts
        run: |
          VERSION="${{ steps.get-version.outputs.VERSION }}"
          NOTES="${{ steps.get-notes.outputs.NOTES }}"

          cat > website/src/lib/version.ts << EOF
          /**
           * HuluChat Version Configuration
           *
           * This file is automatically updated by the release workflow.
           * DO NOT manually edit this file - it will be overwritten during releases.
           */

          export const VERSION = "${VERSION}";

          export const RELEASE_NOTES = "${NOTES}";
          EOF

          echo "Updated version.ts:"
          cat website/src/lib/version.ts

      - name: Commit and push version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/src/lib/version.ts
          git commit -m "chore(website): update version to v${{ steps.get-version.outputs.VERSION }} [skip ci]" || echo "No changes to commit"
          git push
